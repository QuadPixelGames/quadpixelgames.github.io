<!-- Link Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  /* =============================================
     BASE: Colours, fonts, background
  ============================================= */
  :root {
    --qpg-bg:         #0b0c10;
    --qpg-bg-card:    rgba(255,255,255,0.02);
    --qpg-border:     rgba(255,255,255,0.06);
    --qpg-green:      #00ff88;
    --qpg-green-dim:  rgba(0,255,136,0.12);
    --qpg-text:       rgba(255,255,255,0.82);
    --qpg-muted:      rgba(255,255,255,0.45);
  }

  body {
    background-color: var(--qpg-bg) !important;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
    color: var(--qpg-text) !important;
  }

  h1, h2, h3, h4, h5, h6,
  .page__title,
  .archive__subtitle,
  .masthead__menu-item a {
    font-family: 'Outfit', sans-serif !important;
    font-weight: 700;
  }

  /* =============================================
     NAVBAR — unified with page background
  ============================================= */
  .masthead,
  .masthead__inner-wrap,
  .greedy-nav,
  .greedy-nav a,
  .greedy-nav__toggle,
  .visible-links,
  .visible-links li {
    background-color: var(--qpg-bg) !important;
    background:       var(--qpg-bg) !important;
  }

  .masthead {
    border-bottom: 1px solid rgba(255,255,255,0.06) !important;
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
  }

  /* Hide the text title — we show the logo instead */
  .masthead .site-title {
    display: none !important;
  }

  /* ── LOGO sizing ── */
  .masthead .site-logo {
    margin-right: 0.5rem !important;
    padding: 0.2rem 0 !important;
    display: flex !important;
    align-items: center !important;
  }

  .masthead .site-logo img {
    height: 5.5rem !important;   /* HUGE logo */
    max-height: 5.5rem !important;
    width: auto !important;
    display: block !important;
    object-fit: contain !important;
    transform: scale(1.2);       /* Scale up slightly to counteract any internal transparent padding */
  }

  /* nav link colours */
  .greedy-nav a {
    color: rgba(255,255,255,0.75) !important;
  }
  .greedy-nav a:hover,
  .greedy-nav a.active {
    color: var(--qpg-green) !important;
  }

  /* hamburger icon */
  .greedy-nav__toggle,
  .navicon,
  .navicon::before,
  .navicon::after {
    background: rgba(255,255,255,0.7) !important;
  }

  /* =============================================
     FOOTER
  ============================================= */
  .page__footer {
    border-top: 1px solid rgba(255,255,255,0.05) !important;
    background-color: #08090d !important;
  }
  .page__footer-follow li strong,
  .page__footer-copyright {
    color: rgba(255,255,255,0.35) !important;
    font-size: 0.78rem;
  }

  /* =============================================
     MAIN LAYOUT — compress white space
  ============================================= */
  #main {
    padding-top: 1rem !important;
    padding-bottom: 1.5rem !important;
    max-width: 1200px !important;
    width: 100% !important;
    box-sizing: border-box !important;
  }

  .archive, .page {
    width: 100% !important;
    max-width: 100% !important;
    float: none !important;
    padding-right: 0 !important;
    padding-left: 0 !important;
  }

  .page__inner-wrap {
    padding-right: 0 !important;
    padding-left: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
  }

  @media (min-width: 80em) {
    #main {
      padding-left: 2rem !important;
      padding-right: 2rem !important;
    }
  }

  /* =============================================
     SIDEBAR — fix the scrolling-overlap bug
     Author profile should NOT be sticky/fixed
  ============================================= */
  .sidebar {
    position: static !important;       /* kill sticky positioning */
    top: auto !important;
    float: none !important;
    opacity: 1 !important;
    -webkit-transform: none !important;
    transform: none !important;
  }

  /* On narrow screens hide sidebar author completely on posts */
  @media (max-width: 64em) {
    .sidebar.sticky {
      display: none !important;
    }
    .layout--single .page {
      width: 100% !important;
      padding-right: 0 !important;
    }
  }

  /* =============================================
     SCROLLBAR — premium thin style
  ============================================= */
  ::-webkit-scrollbar       { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--qpg-bg); }
  ::-webkit-scrollbar-thumb { background: #1a1d26; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--qpg-green); }

  /* =============================================
     HOME — Hero Section
  ============================================= */
  .qpg-home {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0.5rem 0;
  }

  .qpg-hero-section {
    position: relative;
    padding: 3.5rem 1.5rem;
    background: radial-gradient(circle at top right,  rgba(0,255,136,0.07),       transparent 55%),
                radial-gradient(circle at bottom left, rgba(124,77,255,0.04),     transparent 55%),
                #0e1017;
    border: 1px solid var(--qpg-border);
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 2rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
  }

  .qpg-hero-grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.014) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(circle, white, transparent 80%);
    pointer-events: none;
  }

  .qpg-hero-content {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 700px;
    margin: 0 auto;
  }

  .qpg-studio-badge {
    display: inline-block;
    background: var(--qpg-green-dim);
    color: var(--qpg-green);
    border: 1px solid rgba(0,255,136,0.22);
    font-size: 0.72rem;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 1.5rem;
  }

  .qpg-hero-title {
    font-size: 3.5rem !important;
    font-weight: 800 !important;
    line-height: 1.05;
    letter-spacing: -0.04em;
    margin: 0 0 1.2rem 0 !important;
    background: linear-gradient(135deg, #fff 30%, #a0f0c0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .qpg-hero-lead {
    font-size: 1.15rem;
    line-height: 1.6;
    color: rgba(255,255,255,0.7);
    margin-bottom: 2.2rem;
  }

  .qpg-hero-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ── Buttons ── */
  .qpg-action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.85rem 1.8rem;
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 12px;
    text-decoration: none !important;
    transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
  }
  .qpg-btn-primary {
    background: #fff;
    color: #000 !important;
    box-shadow: 0 4px 15px rgba(255,255,255,0.1);
  }
  .qpg-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255,255,255,0.2);
    background: var(--qpg-green);
  }
  .qpg-btn-secondary {
    background: rgba(255,255,255,0.05);
    color: #fff !important;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .qpg-btn-secondary:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
  }

  /* ── Section titles ── */
  .qpg-section-title {
    font-size: 1.4rem !important;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 2.2rem 0 1.2rem 0 !important;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: #fff;
  }

  /* ── Featured Games Grid ── */
  .qpg-featured-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  .qpg-featured-card {
    display: flex;
    background: var(--qpg-bg-card);
    border: 1px solid var(--qpg-border);
    border-radius: 20px;
    overflow: hidden;
    text-decoration: none !important;
    color: inherit !important;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  }
  .qpg-featured-card:hover {
    background: rgba(255,255,255,0.04);
    transform: translateY(-4px);
  }

  .qpg-featured-card__media {
    width: 100px;
    font-size: 2.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.02);
    border-right: 1px solid rgba(255,255,255,0.04);
    flex-shrink: 0;
  }

  .card-flappy:hover {
    border-color: rgba(0,255,136,0.3);
    box-shadow: 0 10px 30px rgba(0,255,136,0.05);
  }
  .card-flappy:hover .qpg-featured-card__media {
    background: linear-gradient(135deg, rgba(0,255,136,0.1), transparent);
  }
  .card-blaster:hover {
    border-color: rgba(124,77,255,0.3);
    box-shadow: 0 10px 30px rgba(124,77,255,0.05);
  }

  .qpg-featured-card__info {
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .qpg-featured-card__info h3 {
    margin: 0 !important;
    font-size: 1.15rem !important;
    color: #fff;
  }
  .qpg-featured-card__info p {
    margin: 0 !important;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.4;
  }

  .qpg-status-tag {
    display: inline-block;
    align-self: flex-start;
    font-size: 0.6rem;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 100px;
    margin-bottom: 0.25rem;
  }
  .qpg-status-tag.live {
    background: rgba(0,255,136,0.1);
    color: var(--qpg-green);
    border: 1px solid rgba(0,255,136,0.2);
  }
  .qpg-status-tag.upcoming {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* ── Devlog Grid ── */
  .qpg-devlog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
  }

  .qpg-devlog-card {
    background: rgba(255,255,255,0.01);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 16px;
    padding: 1.5rem;
    text-decoration: none !important;
    color: inherit !important;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: all 0.2s ease;
  }
  .qpg-devlog-card:hover {
    background: rgba(255,255,255,0.025);
    border-color: rgba(255,255,255,0.1);
    transform: translateY(-2px);
  }
  .qpg-devlog-date {
    font-size: 0.72rem;
    color: var(--qpg-muted);
    font-family: 'Space Grotesk', sans-serif;
  }
  .qpg-devlog-card h3 {
    margin: 0 !important;
    font-size: 1.05rem !important;
    color: #fff;
    line-height: 1.3;
  }
  .qpg-devlog-card p {
    margin: 0 !important;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
    flex-grow: 1;
  }
  .qpg-read-more {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--qpg-green);
    margin-top: 0.5rem;
  }

  /* =============================================
     RESPONSIVE
  ============================================= */
  @media (max-width: 768px) {
    .qpg-hero-title {
      font-size: 2.2rem !important;
    }
    .qpg-hero-section {
      padding: 2.5rem 1.2rem;
    }
    .masthead .site-logo img {
      height: 4rem !important;
      max-height: 4rem !important;
    }
    .qpg-featured-grid,
    .qpg-devlog-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 480px) {
    .qpg-hero-title {
      font-size: 1.9rem !important;
    }
    .masthead .site-logo img {
      height: 3rem !important;
      max-height: 3rem !important;
    }
  }
</style>

<!-- end custom head snippets -->
