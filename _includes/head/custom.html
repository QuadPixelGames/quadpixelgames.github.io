<!-- Link Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  /* Base Style Overrides to make it look custom & premium */
  body {
    background-color: #0b0c10 !important;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
  }
  
  h1, h2, h3, h4, h5, h6, .page__title, .archive__subtitle, .masthead__menu-item a {
    font-family: 'Outfit', sans-serif !important;
    font-weight: 700;
  }

  .masthead {
    background-color: rgba(11, 12, 16, 0.8) !important;
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .page__footer {
    border-top: 1px solid rgba(255, 255, 255, 0.05) !important;
    background-color: #08090d !important;
  }

  /* Custom Premium Scrollbars */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: #0b0c10;
  }
  ::-webkit-scrollbar-thumb {
    background: #1a1d26;
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #00ff88;
  }

  /* --- QPG CUSTOM HERO SECTION --- */
  .qpg-home {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem 0;
  }

  .qpg-hero-section {
    position: relative;
    padding: 5rem 2rem;
    background: radial-gradient(circle at top right, rgba(0, 255, 136, 0.06), transparent 50%),
                radial-gradient(circle at bottom left, rgba(124, 77, 255, 0.04), transparent 50%),
                #0e1017;
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 3rem;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .qpg-hero-grid-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
      linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(circle, white, transparent 80%);
    pointer-events: none;
  }

  .qpg-hero-content {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 700px;
    margin: 0 auto;
  }

  .qpg-studio-badge {
    display: inline-block;
    background: rgba(0, 255, 136, 0.1);
    color: #00ff88;
    border: 1px solid rgba(0, 255, 136, 0.2);
    font-size: 0.72rem;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 1.5rem;
  }

  .qpg-hero-title {
    font-size: 3.5rem !important;
    font-weight: 800 !important;
    line-height: 1.05;
    letter-spacing: -0.04em;
    margin: 0 0 1.2rem 0 !important;
    background: linear-gradient(135deg, #ffffff 30%, #a0f0c0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .qpg-hero-lead {
    font-size: 1.15rem;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 2.2rem;
  }

  .qpg-hero-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* BUTTONS styling */
  .qpg-action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.85rem 1.8rem;
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 12px;
    text-decoration: none !important;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .qpg-btn-primary {
    background: #ffffff;
    color: #000000 !important;
    box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
  }

  .qpg-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
    background: #00ff88;
  }

  .qpg-btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    color: #ffffff !important;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .qpg-btn-secondary:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
  }

  /* SECTION LABELS */
  .qpg-section-title {
    font-size: 1.4rem !important;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 3.5rem 0 1.5rem 0 !important;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: #ffffff;
  }

  /* --- FEATURED GAMES GRID --- */
  .qpg-featured-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.5rem;
  }

  .qpg-featured-card {
    display: flex;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 20px;
    overflow: hidden;
    text-decoration: none !important;
    color: inherit !important;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .qpg-featured-card:hover {
    background: rgba(255, 255, 255, 0.04);
    transform: translateY(-4px);
  }

  .qpg-featured-card__media {
    width: 100px;
    font-size: 2.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.02);
    border-right: 1px solid rgba(255, 255, 255, 0.04);
    flex-shrink: 0;
  }

  .card-flappy:hover {
    border-color: rgba(0, 255, 136, 0.3);
    box-shadow: 0 10px 30px rgba(0, 255, 136, 0.05);
  }
  .card-flappy:hover .qpg-featured-card__media {
    background: linear-gradient(135deg, rgba(0,255,136,0.1), transparent);
  }

  .card-blaster:hover {
    border-color: rgba(124, 77, 255, 0.3);
    box-shadow: 0 10px 30px rgba(124, 77, 255, 0.05);
  }

  .qpg-featured-card__info {
    padding: 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .qpg-featured-card__info h3 {
    margin: 0 !important;
    font-size: 1.15rem !important;
    color: #ffffff;
  }

  .qpg-featured-card__info p {
    margin: 0 !important;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.4;
  }

  .qpg-status-tag {
    display: inline-block;
    align-self: flex-start;
    font-size: 0.6rem;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 100px;
    margin-bottom: 0.25rem;
  }

  .qpg-status-tag.live {
    background: rgba(0, 255, 136, 0.1);
    color: #00ff88;
    border: 1px solid rgba(0, 255, 136, 0.2);
  }

  .qpg-status-tag.upcoming {
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* --- DEVLOG LISTING ON HOME --- */
  .qpg-devlog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .qpg-devlog-card {
    background: rgba(255, 255, 255, 0.01);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 16px;
    padding: 1.5rem;
    text-decoration: none !important;
    color: inherit !important;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: all 0.2s ease;
  }

  .qpg-devlog-card:hover {
    background: rgba(255, 255, 255, 0.02);
    border-color: rgba(255, 255, 255, 0.1);
    transform: translateY(-2px);
  }

  .qpg-devlog-date {
    font-size: 0.72rem;
    color: rgba(255, 255, 255, 0.4);
    font-family: 'Space Grotesk', sans-serif;
  }

  .qpg-devlog-card h3 {
    margin: 0 !important;
    font-size: 1.1rem !important;
    color: #ffffff;
    line-height: 1.3;
  }

  .qpg-devlog-card p {
    margin: 0 !important;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.5;
    flex-grow: 1;
  }

  .qpg-read-more {
    font-size: 0.8rem;
    font-weight: 600;
    color: #00ff88;
    margin-top: 0.5rem;
  }

  @media (max-width: 768px) {
    .qpg-hero-title {
      font-size: 2.5rem !important;
    }
  }
</style>

<!-- end custom head snippets -->
