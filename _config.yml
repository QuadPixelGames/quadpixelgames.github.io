# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: QuadPixel Games
logo: "/assets/images/quadpixellogo.png"
url: "https://quadpixelgames.github.io"
baseurl: ""
masthead_title: " "   # suppress text title in navbar; logo shows instead
email:
description: >-
  Indie game studio making chaotic, weird, and wildly fun games. Zero chill. Max fun.
github_username: QuadPixelGames
minimal_mistakes_skin: dark

search:
  enabled: true
  fulltext: true
  excerpt_length: 50
  max_indexed_count: 500


# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone:

include:
  - _pages

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Author (sidebar profile)
author:
  name: QuadPixel Games
  bio: "We make chaotic little games with ✨ zero chill ✨ and max fun."
  avatar: /assets/images/quadpixellogo.png
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/QuadPixelGames"
    - label: "YouTube"
      icon: "fab fa-youtube"
      url: "https://youtube.com/@QuadPixelGames"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/QuadPixelGames"
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://youtube.com/@QuadPixelGames"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false   # no sidebar overlap on posts
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false   # pages also full-width

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
